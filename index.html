<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>My AI Showcase</title>
    <link rel="stylesheet" href="style.css">
</head>

<body>

    <header>
        <h1>My AI Project</h1>
        <p>A simple demo website for the CESA SC AI Challenge</p>
    </header>

    <main>
        <section id="about">
            <h2>About My AI</h2>
            <p>Describe what your AI does here.</p>
        </section>

        <section id="demo">
            <h2>Try It Out</h2>

            <textarea id="inputText" placeholder="Enter your input here..."></textarea>
            <button onclick="runAI()">Run AI</button>

            <div id="output">
                <h3>Output</h3>
                <p id="result"></p>
            </div>
        </section>

        <section id="details">
            <h2>How It Works</h2>
            <p>Explain your model or algorithm here.</p>
        </section>

    </main>

    <footer>
        <p>&copy; 2026 My AI Project</p>
    </footer>

    <script src="script.js"></script>
</body>

</html>
